name: Validate starter

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Run validator tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate starter structure
        run: python scripts/validate_starter.py

      - name: Lint Markdown
        if: runner.os == 'Linux'
        run: npx --yes markdownlint-cli2@0.18.1 "**/*.md" "#node_modules"